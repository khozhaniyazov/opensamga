name: CI

# Frontend lane: typecheck + lint + vitest + build + bundle-size.
# Heavy lanes (this one + playwright.yml + a11y.yml) only trigger on
# FE-relevant paths so backend-only PRs don't burn minutes here.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci.yml"
      - "package*.json"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ci.yml"
      - "package*.json"

# Cancel any superseded runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit, prod scope)
        run: npm run typecheck

      - name: Typecheck (tsc --noEmit, test scope)
        # Tests are excluded from prod tsconfig; this lane keeps test
        # files honest.
        run: npm run typecheck:test

      - name: Lint (eslint flat config, prod scope)
        run: npm run lint

      - name: Vitest (unit + contract)
        run: npm test -- --run

      - name: Vitest (coverage report, advisory)
        # Coverage is published as an artifact for trend tracking.
        # No threshold gating yet — picked threshold landing in a
        # later wave once we have a baseline. continue-on-error
        # keeps coverage failures from blocking merges.
        run: npm run coverage -- --reporter=basic
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore
          retention-days: 7

      - name: Vite build
        run: npm run build

      - name: Bundle-size budgets (gzip)
        run: npm run size:check

      - name: Upload bundle stats
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: ignore
          retention-days: 7
