name: Accessibility (axe-core, public)

# Public-screens accessibility lane. Runs axe-core against the
# PUBLIC screens only (landing, login, register, 404, legal-*) —
# the authenticated half of the a11y suite needs a real backend +
# session and is exercised locally / in staging, not on PR CI.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/a11y.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/a11y.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  axe-public:
    name: axe-core (public screens)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start preview server (background)
        # `vite preview` defaults to port 4173. We rebind to 5174
        # because the a11y config + spec helpers all assume that
        # baseURL.
        run: |
          npx vite preview --host 127.0.0.1 --port 5174 --strictPort &
          # Wait up to 60s for the server to come up.
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:5174 > /dev/null; then
              echo "Preview server is up."
              break
            fi
            sleep 1
          done

      - name: Run axe-core on public screens
        run: |
          npx playwright test \
            --config tests/a11y/a11y.config.ts \
            --grep "public"

      - name: Upload a11y report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-report
          path: |
            frontend/test-results/a11y
          if-no-files-found: ignore
          retention-days: 7
