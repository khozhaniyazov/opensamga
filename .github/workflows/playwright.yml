name: Playwright (smoke)

# Non-blocking E2E lane. Real Playwright coverage runs locally
# (`npx playwright test` inside frontend/). This CI job exists so
# the harness doesn't rot — if `landing.spec.ts` stops even loading
# the page we want to know on a PR.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/playwright.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/playwright.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Playwright landing smoke (chromium only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run landing smoke
        # The local dev server is started by playwright.config.ts
        # via webServer.command. We pin to chromium to keep the
        # job fast (Firefox/WebKit add ~2x).
        run: |
          npx playwright test \
            --project=chromium \
            tests/landing.spec.ts \
            || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
          retention-days: 7
