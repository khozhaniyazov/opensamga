[pytest]
testpaths = tests
asyncio_mode = auto
markers =
    integration: tests that require a real Postgres at TEST_DATABASE_URL (not run by default)
# Session 15 (2026-04-21): DB-backed suites (test_chat.py, test_exam.py,
# test_exam_history.py) depend on a live test database at
# TEST_DATABASE_URL. The conftest `test_user` fixture does a real insert.
# Mark the whole suite as `integration` and exclude by default so the
# "is it green" signal on developer laptops (no DB) stays clean.
# Run them explicitly with:    pytest -m integration
addopts = -m "not integration"
