server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/vnd.ms-fontobject application/x-javascript;

    # ---------------------------------------------------------------------
    # Security headers — applied to every response.
    #
    # opensamga round-3 (2026-05-15) audit closed:
    #   * No CSP / frame-ancestors → click-jacking the auth screens.
    #   * No HSTS → no transport hardening once the site is HTTPS.
    #   * No Referrer-Policy → ?token=… leaks via Referer.
    #   * No X-Content-Type-Options / X-Frame-Options.
    #
    # `'unsafe-inline'` on style is unavoidable today (Vite + Tailwind ship
    # inline `<style>` blocks). `'unsafe-eval'` is omitted on purpose —
    # we have no codebase site that requires `eval` / `new Function`. If a
    # legitimate dependency starts requiring it, prefer a nonce or hash.
    # ---------------------------------------------------------------------
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; media-src 'self' data: blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # NOTE: `backend` is a docker-compose service alias. opensamga does NOT
    # ship a docker-compose.yml — for a stand-alone `docker run` deploy,
    # rebuild this image with `--build-arg BACKEND_HOST=…` (or sed the
    # value below) so nginx can resolve the upstream. The port matches
    # the backend `Dockerfile` CMD which uses 8001.
    location /api {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /ws {
        proxy_pass http://backend:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
